      function mkLoadStars() {
        const c = document.getElementById("lstars");
        if (!c) return;
        for (let i = 0; i < 120; i++) {
          const s = document.createElement("div");

      function updProg(r) {
        const o = PROG_C * (1 - Math.min(1, r));
        const f = document.getElementById("pgf"),
          g = document.getElementById("pgl");

        if (g) g.style.strokeDashoffset = o;

      function toast(m, d = 2500) {
        const e = document.getElementById("tst");
        e.textContent = m;
        e.classList.add("show");
        if (toastTm) clearTimeout(toastTm);
        toastTm = setTimeout(() => e.classList.remove("show"), d);
      }
      function eio(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }
      function mkHeart(s) {
        const sh = new THREE.Shape();
        sh.moveTo(0.5 * s, 0.5 * s);
        sh.bezierCurveTo(0.5 * s, 0.5 * s, 0.4 * s, 0, 0, 0);
        sh.bezierCurveTo(-0.6 * s, 0, -0.6 * s, 0.7 * s, -0.6 * s, 0.7 * s);
        sh.bezierCurveTo(
          -0.6 * s,
          1.1 * s,
          -0.3 * s,
          1.54 * s,
          0.5 * s,
          1.9 * s,
        );
        sh.bezierCurveTo(1.3 * s, 1.54 * s, 1.6 * s, 1.1 * s, 1.6 * s, 0.7 * s);
        sh.bezierCurveTo(1.6 * s, 0.7 * s, 1.6 * s, 0, 1 * s, 0);
        sh.bezierCurveTo(0.7 * s, 0, 0.5 * s, 0.5 * s, 0.5 * s, 0.5 * s);
        const g = new THREE.ExtrudeGeometry(sh, {
          depth: 0.8 * s,
          bevelEnabled: true,
          bevelSegments: 15,
          steps: 2,
          bevelSize: 0.6 * s,
          bevelThickness: 0.6 * s,
        });
        g.center();
        g.rotateZ(Math.PI);
        return g;
      }
      function heartbeat(t) {
        const c = t % 0.85;
        return (
          1 +
          Math.exp(-Math.pow((c - 0.1) * 20, 2)) * 0.06 +
          Math.exp(-Math.pow((c - 0.25) * 20, 2)) * 0.03
        );
      }
      function initGrain() {
        const c = document.createElement("canvas");

        const x = c.getContext("2d");
        const d = x.createImageData(128, 128);
        for (let i = 0; i < d.data.length; i += 4) {
          const v = Math.random() * 255;
          d.data[i] = d.data[i + 1] = d.data[i + 2] = v;
          d.data[i + 3] = 255;
        }
        x.putImageData(d, 0, 0);
        document.getElementById("grain").style.backgroundImage =
          `url(${c.toDataURL()})`;

      /* === PULSE === */
      class Pulse {
        constructor(s) {
          this.s = s;
          this.p = [];
        }
        fire() {
          const sg = new THREE.SphereGeometry(1, 32, 32);
          const sm = new THREE.ShaderMaterial({
            uniforms: {
              uO: { value: 0.6 },
              uC: { value: new THREE.Color(PK_L) },
            },
            vertexShader:
              "varying vec3 vN;varying vec3 vV;void main(){vN=normalize(normalMatrix*normal);vV=normalize((modelViewMatrix*vec4(position,1.)).xyz);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}",
            fragmentShader:
              "uniform float uO;uniform vec3 uC;varying vec3 vN;varying vec3 vV;void main(){float f=pow(1.0-abs(dot(vN,vV)),2.5);gl_FragColor=vec4(uC,f*uO);}",
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide,
          });
          const sp = new THREE.Mesh(sg, sm);
          this.s.add(sp);
          const m1 = new THREE.Mesh(
            new THREE.TorusGeometry(1, 0.03, 8, 80),
            new THREE.MeshBasicMaterial({
              color: PK_L,
              transparent: true,
              opacity: 0.6,
              blending: THREE.AdditiveBlending,
              depthWrite: false,
            }),
          );
          m1.rotation.x = Math.PI / 2;
          this.s.add(m1);
          const m2 = new THREE.Mesh(
            new THREE.TorusGeometry(1, 0.015, 8, 80),
            new THREE.MeshBasicMaterial({
              color: 0xfbcfe8,
              transparent: true,
              opacity: 0.3,
              blending: THREE.AdditiveBlending,
              depthWrite: false,
            }),
          );
          m2.rotation.x = Math.PI / 2 + 0.3;
          this.s.add(m2);
          const pl = new THREE.PointLight(PK_L, 2.5, 18);
          this.s.add(pl);
          this.p.push({
            sp,
            m1,
            m2,
            pl,
            sm,
            m1m: m1.material,
            m2m: m2.material,
            l: 0,
            ml: 4,
          });
        }
        update(dt) {
          for (let i = this.p.length - 1; i >= 0; i--) {
            const p = this.p[i];
            p.l += dt;
            const t = p.l / p.ml,
              sw = 1 - Math.pow(1 - t, 3);
            p.sp.scale.setScalar(0.1 + sw * 8);
            p.sm.uniforms.uO.value = Math.max(0, 0.6 * (1 - t * t));
            p.m1.scale.setScalar(Math.max(0.01, sw * 8.5 - 0.3));
            p.m1m.opacity = Math.max(0, 0.6 * Math.pow(1 - t, 1.8));
            const d2 = Math.max(0, sw - 0.08);
            p.m2.scale.setScalar(Math.max(0.01, d2 * 8 - 0.5));
            p.m2m.opacity = Math.max(0, 0.3 * Math.pow(1 - t, 2.2));
            const r = sw * 6,
              a = sw * Math.PI * 1.5;
            p.pl.position.set(Math.sin(a) * r, 1.2 * (1 - sw), Math.cos(a) * r);
            p.pl.intensity = Math.max(0, 2.5 * Math.pow(1 - t, 3));
            if (p.l >= p.ml) {
              [p.sp, p.m1, p.m2, p.pl].forEach((o) => this.s.remove(o));
              [
                p.sp.geometry,
                p.sm,
                p.m1.geometry,
                p.m1m,
                p.m2.geometry,
                p.m2m,
              ].forEach((o) => o.dispose());
              this.p.splice(i, 1);
            }
          }
        }
      }

      /* === CINEMATIC === */
      const SHOTS = [
        {
          d: 5.5,
          n: "Orbit",
          f: (t, s) => {
            const a = Math.atan2(s.x, s.z) + t * Math.PI * 2,
              r = s.length() * (1 - 0.12 * Math.sin(t * Math.PI));
            return new THREE.Vector3(
              Math.sin(a) * r,
              s.y + 3 * Math.sin(t * Math.PI * 2),
              Math.cos(a) * r,
            );
          },
        },
        {
          d: 5,
          n: "Dive",
          f: (t, s) => {
            const a = Math.atan2(s.x, s.z) + t * Math.PI * 1.5,
              r = s.length() * (1 - 0.35 * t);
            return new THREE.Vector3(
              Math.sin(a) * r,
              s.y + 6 * (1 - t) * (1 - t) - 4 * t,
              Math.cos(a) * r,
            );
          },
        },
        {
          d: 6.5,
          n: "Figure 8",
          f: (t, s) => {
            const a = t * Math.PI * 2,
              sc = s.length() * 0.6;
            return new THREE.Vector3(
              Math.sin(a) * sc,
              s.y + 2 * Math.sin(a * 2),
              Math.sin(a * 2) * sc * 0.45,
            );
          },
        },
        {
          d: 4.5,
          n: "Push In",
          f: (t, s) => {
            const r = s.length() * (1 - 0.4 * t),
              dr = Math.sin(t * Math.PI * 3) * 2.5 * (1 - t),
              a = Math.atan2(s.x, s.z) + t * Math.PI * 0.6;
            return new THREE.Vector3(
              Math.sin(a) * r + dr * Math.cos(a),
              s.y - 2 * t + Math.sin(t * Math.PI) * 2.5,
              Math.cos(a) * r + dr * Math.sin(a),
            );
          },
        },
        {
          d: 5,
          n: "Rise",
          f: (t, s) => {
            const a = Math.atan2(s.x, s.z) - t * Math.PI * 1.8,
              r = s.length() * (0.65 + 0.45 * t);
            return new THREE.Vector3(
              Math.sin(a) * r,
              s.y + 6 * t * t,
              Math.cos(a) * r,
            );
          },
        },
        {
          d: 5.5,
          n: "Sweep",
          f: (t, s) => {
            const fw = new THREE.Vector3(-s.x, 0, -s.z).normalize();
            const rt = new THREE.Vector3()
              .crossVectors(fw, new THREE.Vector3(0, 1, 0))
              .normalize();
            const sw = Math.sin(t * Math.PI) * 10,
              dp = Math.cos(t * Math.PI) * 2;
            return new THREE.Vector3(
              s.x + rt.x * sw - fw.x * dp,
              s.y + 2.5 * Math.sin(t * Math.PI * 2),
              s.z + rt.z * sw - fw.z * dp,
            );
          },
        },
        {
          d: 6,
          n: "Pull Back",
          f: (t, s) => {
            let r;
            if (t < 0.2) r = s.length() * (1 + 0.6 * (t / 0.2));
            else {
              const rt = (t - 0.2) / 0.8;
              r = s.length() * 1.6 * (1 - 0.6 * eio(rt));
            }
            const a = Math.atan2(s.x, s.z) + t * Math.PI * 1.2;
            return new THREE.Vector3(
              Math.sin(a) * r,
              s.y + 4 * Math.sin(t * Math.PI),
              Math.cos(a) * r,
            );
          },
        },
      ];
      let cinQ = [],
        cinC = null;
      function startCin() {
        if (introAn || cinC) return;
        if (flying) toggleFly();
        const pool = [...SHOTS],
          cnt = 2 + Math.floor(Math.random() * 3);
        cinQ = [];
        for (let i = 0; i < cnt && pool.length; i++) {
          const idx = Math.floor(Math.random() * pool.length);
          cinQ.push(pool[idx]);
          pool.splice(idx, 1);
        }
        nextShot();
        toast("Cinematic: " + cinQ.map((s) => s.n).join(" \u2192"), 3000);
        document.getElementById("cinb").classList.add("show");
      }
      function nextShot() {
        if (!cinQ.length) {
          cinC = null;
          ctl.enabled = true;
          document.getElementById("cinb").classList.remove("show");
          return;
        }
        const sh = cinQ.shift();
        cinC = {
          ...sh,
          startPos: cam.position.clone(),
          startTime: clk.getElapsedTime(),
        };
        ctl.enabled = false;
      }
      function updCin(t) {
        if (!cinC) return;
        const p = Math.min((t - cinC.startTime) / cinC.d, 1);
        const e = eio(p);
        const pos = cinC.f(e, cinC.startPos);
        cam.position.copy(pos);
        cam.lookAt(0, 0, 0);
        tDist = pos.length();
        if (p >= 1) nextShot();
      }

      /* ================================================================
   AURORA 
   ================================================================ */
      function mkAurora() {
        const grp = new THREE.Group();
        const meshes = [];
        const segs = IS_MOBILE ? 64 : 100;

        const cfgs = [
          {
            r: 2,
            h: 6,
            y: 0.3,
            c: [0x00ff88, 0x00bbff, 0x7744ff],
            ph: 0,
            al: 0.32,
          },
          {
            r: 4,
            h: 7,
            y: -0.2,
            c: [0x44ffaa, 0x2288ff, 0xaa44ff],
            ph: 1.3,
            al: 0.26,
          },
          {
            r: 6.2,
            h: 7.5,
            y: 0.5,
            c: [0x00ff66, 0x0066ff, 0x6644ff],
            ph: 2.6,
            al: 0.28,
          },
          {
            r: 8.4,
            h: 7,
            y: -0.3,
            c: [0x22ffbb, 0x3377ff, 0xff55bb],
            ph: 3.9,
            al: 0.22,
          },
          {
            r: 10.6,
            h: 6.5,
            y: 0.4,
            c: [0x00ff99, 0x0099ff, 0x9944ff],
            ph: 5.2,
            al: 0.18,
          },
        ];
        if (!IS_MOBILE)
          cfgs.push({
            r: 13,
            h: 6,
            y: 0,
            c: [0x66ffcc, 0x4466ff, 0xcc55ff],
            ph: 6.5,
            al: 0.14,
          });

        for (const cfg of cfgs) {
          const pos = [],
            uv = [],
            idx = [];
          for (let i = 0; i <= segs; i++) {
            const t = i / segs,
              a = t * Math.PI * 2;
            const cx = Math.cos(a) * cfg.r,
              cz = Math.sin(a) * cfg.r;
            pos.push(cx, cfg.y - cfg.h / 2, cz);
            uv.push(t, 0);
            pos.push(cx, cfg.y + cfg.h / 2, cz);
            uv.push(t, 1);
            if (i < segs) {
              const b = i * 2;
              idx.push(b, b + 2, b + 1, b + 1, b + 2, b + 3);
            }
          }
          const g = new THREE.BufferGeometry();
          g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
          g.setAttribute("aUv", new THREE.Float32BufferAttribute(uv, 2));
          g.setIndex(idx);

          const m = new THREE.ShaderMaterial({
            uniforms: {
              uTime: { value: 0 },
              uC1: { value: new THREE.Color(cfg.c[0]) },
              uC2: { value: new THREE.Color(cfg.c[1]) },
              uC3: { value: new THREE.Color(cfg.c[2]) },
              uPh: { value: cfg.ph },
              uAl: { value: cfg.al },
            },
            vertexShader: `
                attribute vec2 aUv;
                varying vec2 vUv;
                uniform float uTime;
                uniform float uPh;
                void main(){
                    vUv=aUv;
                    vec3 p=position;
                    float a=aUv.x*6.28318;
                    p.y+=sin(a*3.+uTime*.4+uPh)*.5;
                    p.y+=sin(a*7.+uTime*.7+uPh*.5)*.18;
                    p.y+=cos(a*5.+uTime*.3+uPh*1.3)*.25;
                    float rB=1.+sin(a*2.+uTime*.25+uPh)*.06;
                    p.x*=rB;
                    p.z*=rB;
                    gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);
                }
            `,
            fragmentShader: `
                uniform float uTime;
                uniform vec3 uC1;
                uniform vec3 uC2;
                uniform vec3 uC3;
                uniform float uPh;
                uniform float uAl;
                varying vec2 vUv;
                void main(){
                    float vs=sin(uTime*.22+uPh)*.18;
                    float v=clamp(vUv.y+vs,0.,1.);
                    vec3 col=mix(uC1,uC2,smoothstep(0.,.45,v));
                    col=mix(col,uC3,smoothstep(.45,1.,v));
                    float rays=.6+.4*sin(vUv.x*28.+uTime*.55+sin(vUv.y*4.+uTime*.75)*2.8+uPh);
                    float flow=.5+.5*sin(vUv.x*5.5+uTime*.85+uPh*.7);
                    float curtain=pow(sin(vUv.y*3.14159),0.3);
                    float ef=smoothstep(0.,.08,vUv.y)*smoothstep(1.,.92,vUv.y);
                    ef*=smoothstep(0.,.02,vUv.x)*smoothstep(1.,.98,vUv.x);
                    float alpha=(curtain*rays*flow*ef+.15)*uAl;
                    gl_FragColor=vec4(col,alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide,
          });
          const mesh = new THREE.Mesh(g, m);
          mesh.rotation.x = (Math.random() - 0.5) * 0.12;
          mesh.rotation.z = (Math.random() - 0.5) * 0.08;
          grp.add(mesh);
          meshes.push(mesh);
        }

        const l1 = new THREE.PointLight(0x00ff88, 2.0, 28);
        const l2 = new THREE.PointLight(0x4488ff, 1.6, 28);
        const l3 = new THREE.PointLight(0x8844ff, 1.2, 22);
        l1.position.set(3, 3, 0);
        l2.position.set(-3, -1, 3);
        l3.position.set(0, 2, -4);
        grp.add(l1, l2, l3);
        scene.add(grp);
        return { grp, meshes, lights: [l1, l2, l3] };
      }

      /* === PLANET RINGS === */
      function mkPlanetRings() {
        planetRings = new THREE.Group();
        ringPMats = [];
        const tx = Math.PI / 2.3;
        const bands = IS_MOBILE
          ? [
              {
                mn: 2.5,
                mx: 3.1,
                n: 450,
                sz: 0.05,
                cl: [0xf0c674, 0xffd700, 0xfbe8a0],
                hs: 0.12,
              },
              {
                mn: 3.2,
                mx: 3.9,
                n: 550,
                sz: 0.06,
                cl: [0xf9a8d4, 0xfbcfe8, 0xf0c674],
                hs: 0.18,
              },
              {
                mn: 4,
                mx: 4.5,
                n: 300,
                sz: 0.035,
                cl: [0xffffff, 0xf0c674, 0xf9a8d4],
                hs: 0.1,
              },
            ]
          : [
              {
                mn: 2.5,
                mx: 3.1,
                n: 900,
                sz: 0.045,
                cl: [0xf0c674, 0xffd700, 0xfbe8a0],
                hs: 0.12,
              },
              {
                mn: 3.2,
                mx: 4,
                n: 1200,
                sz: 0.055,
                cl: [0xf9a8d4, 0xfbcfe8, 0xf0c674],
                hs: 0.2,
              },
              {
                mn: 4.1,
                mx: 4.5,
                n: 500,
                sz: 0.03,
                cl: [0xffffff, 0xf0c674, 0xf9a8d4],
                hs: 0.08,
              },
              {
                mn: 2.8,
                mx: 4.6,
                n: 400,
                sz: 0.02,
                cl: [0xf0c674, 0xfbcfe8, 0xffffff],
                hs: 0.35,
              },
            ];
        for (const b of bands) {
          const pos = new Float32Array(b.n * 3),
            col = new Float32Array(b.n * 3),
            sz = new Float32Array(b.n),
            ph = new Float32Array(b.n),
            sp = new Float32Array(b.n);

          const m = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 } },

              "attribute float aSize;attribute float aPhase;attribute float aSpd;attribute vec3 color;uniform float uTime;varying vec3 vC;varying float vA;void main(){vC=color;vA=.45+.55*sin(uTime*aSpd+aPhase);vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=aSize*(220./-mv.z);gl_Position=projectionMatrix*mv;}",
            fragmentShader:
              "varying vec3 vC;varying float vA;void main(){float d=length(gl_PointCoord-vec2(.5));if(d>.5)discard;float glow=smoothstep(.5,.05,d);float core=smoothstep(.2,0.,d)*.6;gl_FragColor=vec4(vC+core*.3,(glow+core)*vA*.9);}",

          const pts = new THREE.Points(g, m);

          sC[i * 3] = c.r;
          sC[i * 3 + 1] = c.g;
          sC[i * 3 + 2] = c.b;
          sS[i] = 0.08 + Math.random() * 0.12;
          sPh[i] = Math.random() * Math.PI * 2;
          sSp[i] = 0.5 + Math.random() * 1.5;
        }
        const sG = new THREE.BufferGeometry();
        sG.setAttribute("position", new THREE.BufferAttribute(sP, 3));
        sG.setAttribute("color", new THREE.BufferAttribute(sC, 3));
        sG.setAttribute("aSize", new THREE.BufferAttribute(sS, 1));
        sG.setAttribute("aPhase", new THREE.BufferAttribute(sPh, 1));
        sG.setAttribute("aSpd", new THREE.BufferAttribute(sSp, 1));
        const sM = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 } },

            "attribute float aSize;attribute float aPhase;attribute float aSpd;attribute vec3 color;uniform float uTime;varying vec3 vC;varying float vA;void main(){vC=color;vA=.3+.7*pow(max(0.,sin(uTime*aSpd+aPhase)),3.);vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=aSize*(280./-mv.z);gl_Position=projectionMatrix*mv;}",
          fragmentShader:
            "varying vec3 vC;varying float vA;void main(){float d=length(gl_PointCoord-vec2(.5));if(d>.5)discard;float g=exp(-d*6.);float c=smoothstep(.12,0.,d);gl_FragColor=vec4(vC+c*.5,(g+c)*vA);}",
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const sparks = new THREE.Points(sG, sM);

      function mkStars() {

          pos[i * 3 + 1] = r * Math.sin(p) * Math.sin(th);
          pos[i * 3 + 2] = r * Math.cos(p);
          sz[i] = 0.4 + Math.random() * 2.8;
          ph[i] = Math.random() * Math.PI * 2;

            fragmentShader:
              "varying float vA;void main(){float d=length(gl_PointCoord-vec2(.5));if(d>.5)discard;gl_FragColor=vec4(1.,.97,.93,smoothstep(.5,.02,d)*vA);}",

      function mkCoreParticles() {
        const n = IS_MOBILE ? 80 : 160;

          col = new Float32Array(n * 3),
          spd = new Float32Array(n);
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2,
            r = 1.8 + Math.random() * 2.5;
          pos[i * 3] = Math.cos(a) * r;
          pos[i * 3 + 1] = (Math.random() - 0.5) * 2;
          pos[i * 3 + 2] = Math.sin(a) * r;
          spd[i] = 0.15 + Math.random() * 0.4;
          const t = Math.random();
          col[i * 3] = 0.98 * (1 - t) + 0.94 * t;
          col[i * 3 + 1] = 0.66 * (1 - t) + 0.78 * t;
          col[i * 3 + 2] = 0.83 * (1 - t) + 0.46 * t;
        }
        const g = new THREE.BufferGeometry();
        g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        g.setAttribute("color", new THREE.BufferAttribute(col, 3));
        g.setAttribute("aSpd", new THREE.BufferAttribute(spd, 1));
        cParts = new THREE.Points(
          g,
          new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 } },
            vertexShader:
              "attribute float aSpd;attribute vec3 color;uniform float uTime;varying vec3 vC;varying float vA;void main(){vC=color;float a=uTime*aSpd;float ca=cos(a),sa=sin(a);vec3 p=position;p.x=position.x*ca-position.z*sa;p.z=position.x*sa+position.z*ca;p.y+=sin(uTime*.6+aSpd*10.)*.15;vA=.25+.45*sin(uTime*2.+aSpd*8.);vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=4.*(180./-mv.z);gl_Position=projectionMatrix*mv;}",
            fragmentShader:
              "varying vec3 vC;varying float vA;void main(){vec2 p=gl_PointCoord*2.-1.;p.y=-p.y+.3;float x=p.x,y=p.y;float h=x*x+y*y-1.;float d=h*h*h-x*x*y*y*y;if(d>0.)discard;float edge=smoothstep(.02,0.,d);gl_FragColor=vec4(vC,edge*vA*.6);}",
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
          }),
        );
        scene.add(cParts);
      }

      /* === FOTO RINGS === */
      async function mkRing(cfg) {
        const grp = new THREE.Group();
        const loader = new THREE.TextureLoader();

        // Muat foto-foto dari folder lokal (berulang/loop jika foto lebih sedikit dari jumlah cincin)
        const textures = await Promise.all(
          Array.from({ length: cfg.n }, (_, i) =>
            new Promise((res) => {
              if (LOCAL_PHOTOS.length === 0) {
                loadedPh++;
                updProg(loadedPh / totalPh);
                res(null);
                return;
              }
              const photoSrc = LOCAL_PHOTOS[i % LOCAL_PHOTOS.length];
              let done = false;
              const tm = setTimeout(() => {
                if (!done) {
                  done = true;
                  loadedPh++;
                  updProg(loadedPh / totalPh);
                  res(null);
                }
              }, 3500);
              loader.load(
                photoSrc,
                (t) => {
                  if (!done) {
                    done = true;
                    clearTimeout(tm);
                    t.colorSpace = THREE.SRGBColorSpace; // Pastikan warna foto tidak terlalu terang/redup
                    loadedPh++;
                    updProg(loadedPh / totalPh);
                    res(t);
                  }
                },
                undefined,
                () => {
                  if (!done) {
                    done = true;
                    clearTimeout(tm);
                    loadedPh++;
                    updProg(loadedPh / totalPh);
                    res(null);
                  }
                }
              );
            })
          )
        );

        for (let i = 0; i < cfg.n; i++) {
          const g = new THREE.Group(),
            ang = (i / cfg.n) * Math.PI * 2;
          const aMat = new THREE.ShaderMaterial({
            uniforms: {
              uTime: { value: 0 },
              uProx: { value: 0 },
              uC1: { value: new THREE.Color(0x00ff88) },
              uC2: { value: new THREE.Color(0x00bbff) },
              uC3: { value: new THREE.Color(0xec4899) },
            },
            vertexShader:
              "varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}",
            fragmentShader:
              "uniform float uTime;uniform float uProx;uniform vec3 uC1;uniform vec3 uC2;uniform vec3 uC3;varying vec2 vUv;void main(){vec2 c=vUv-.5;float dist=length(c);float border=smoothstep(.40,.50,dist);float shift=sin(uTime*2.+vUv.x*15.)*.5+.5;vec3 col=mix(uC1,uC2,shift);col=mix(col,uC3,sin(uTime*1.5+vUv.y*15.)*.5+.5);float pulse=.6+.4*sin(uTime*3.+dist*30.);float boost=1.+uProx*2.;gl_FragColor=vec4(col,border*pulse*min(.9,.9+uProx*.5)*boost);}",
            transparent: true,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
          const aBorder = new THREE.Mesh(
            new THREE.PlaneGeometry(cfg.s + 0.18, cfg.s + 0.18),
            aMat,
          );
          aBorder.position.z = -0.015;
          g.add(aBorder);
          const db = new THREE.Mesh(
            new THREE.PlaneGeometry(cfg.s + 0.04, cfg.s + 0.04),
            new THREE.MeshBasicMaterial({ color: 0x1a0f24 }),
          );
          db.position.z = 0.004;
          g.add(db);
          const pm = textures[i]
            ? new THREE.MeshStandardMaterial({
                map: textures[i],
                roughness: 0.5,
              })
            : new THREE.MeshStandardMaterial({
                color: 0x2a1a3a,
                roughness: 0.5,
              });
          const ph = new THREE.Mesh(new THREE.PlaneGeometry(cfg.s, cfg.s), pm);
          ph.position.z = 0.01;
          g.add(ph);
          g.position.set(Math.cos(ang) * cfg.r, 0, Math.sin(ang) * cfg.r);
          g.lookAt(Math.cos(ang) * cfg.r * 2, 0, Math.sin(ang) * cfg.r * 2);
          g.userData = {
            angle: ang,
            idx: i,
            ft: null,
            radius: cfg.r,
            bob: cfg.bob,
            exploding: false,
            expPos: null,
            expVel: null,
            springK: 2.5 + Math.random() * 3,
            dampFactor: 0.9 + Math.random() * 0.05,
            aMat,
            group: grp,
          };
          grp.add(g);
          allPhotos.push(g);
        }
        grp.userData.speed = cfg.sp;
        scene.add(grp);
        return grp;
      }
      async function mkAllRings() {
        for (const c of RING_CFG) ringGroups.push(await mkRing(c));
      }

      function updateAllPhotos(t, dt) {
        for (const c of allPhotos) {
          const d = c.userData;
          if (d.aMat) {
            d.aMat.uniforms.uTime.value = t;
            const dist = cam.position.distanceTo(c.position);
            d.aMat.uniforms.uProx.value = Math.max(0, 1 - dist / 8);
          }
          if (flying) {
            if (c.parent !== scene) scene.attach(c);
            if (!d.ft) {
              const fw = new THREE.Vector3();
              cam.getWorldDirection(fw);
              const rt = new THREE.Vector3()
                .crossVectors(fw, cam.up)
                .normalize();
              const up = cam.up.clone();
              d.ft = cam.position
                .clone()
                .add(fw.multiplyScalar(2.5 + Math.random() * 3))
                .add(rt.multiplyScalar((Math.random() - 0.5) * 10))
                .add(up.multiplyScalar((Math.random() - 0.5) * 6));
            }
            c.position.lerp(d.ft, dt * 3);
            c.quaternion.copy(cam.quaternion);
          } else if (d.exploding) {
            if (!d.expPos) d.expPos = c.position.clone();
            if (!d.expVel) d.expVel = new THREE.Vector3();
            const grp = d.group;
            const lt = new THREE.Vector3(
              Math.cos(d.angle) * d.radius,
              Math.sin(t * 0.55 + d.idx * 1.1) * d.bob,
              Math.sin(d.angle) * d.radius,
            );
            const wt = grp ? lt.clone().applyMatrix4(grp.matrixWorld) : lt;
            _tt
              .copy(wt)
              .sub(d.expPos)
              .multiplyScalar(d.springK * dt);
            d.expVel.add(_tt);
            d.expVel.multiplyScalar(d.dampFactor);
            d.expPos.add(d.expVel.clone().multiplyScalar(dt));
            c.position.copy(d.expPos);
            c.quaternion.copy(cam.quaternion);
            if (d.expVel) {
              c.rotateZ(d.expVel.x * 0.04);
              c.rotateX(d.expVel.y * 0.04);
            }
            if (d.expPos.distanceTo(wt) < 0.015 && d.expVel.length() < 0.04) {
              d.exploding = false;
              d.expPos = null;
              d.expVel = null;
              if (grp && c.parent !== grp) grp.attach(c);
            }
          } else {
            if (c.parent !== d.group && d.group) d.group.attach(c);
            d.ft = null;
            const a = d.angle,
              bob = Math.sin(t * 0.55 + d.idx * 1.1) * d.bob;
            _tg.set(Math.cos(a) * d.radius, bob, Math.sin(a) * d.radius);
            c.position.lerp(_tg, dt * 4);
            c.quaternion.copy(cam.quaternion);
          }
        }
      }

      /* === ENVELOPE === */
      function mkEnvelope() {
        envGrp = new THREE.Group();
        envGlow = new THREE.Mesh(
          new THREE.PlaneGeometry(3.6, 2.8),
          new THREE.ShaderMaterial({
            uniforms: {
              uTime: { value: 0 },
              uC: { value: new THREE.Color(0xf0c674) },
            },
            vertexShader:
              "varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}",
            fragmentShader:
              "uniform float uTime;uniform vec3 uC;varying vec2 vUv;void main(){vec2 c=vUv-.5;float d=length(c);float p=.65+.35*sin(uTime*1.8);gl_FragColor=vec4(uC,smoothstep(.5,.02,d)*.22*p);}",
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide,
          }),
        );
        envGlow.position.z = -0.1;
        envGrp.add(envGlow);
        envGrp.add(
          new THREE.Mesh(
            new THREE.BoxGeometry(2.2, 1.5, 0.06),
            new THREE.MeshStandardMaterial({
              color: 0xfffef5,
              roughness: 0.3,
              metalness: 0.05,
              emissive: new THREE.Color(0xf0c674),
              emissiveIntensity: 0.45,
            }),
          ),
        );
        const fs = new THREE.Shape();
        fs.moveTo(-1.1, 0);
        fs.lineTo(1.1, 0);
        fs.lineTo(0, 0.75);
        fs.closePath();
        envFlap = new THREE.Mesh(
          new THREE.ShapeGeometry(fs),
          new THREE.MeshStandardMaterial({
            color: 0xfff8e8,
            roughness: 0.3,
            side: THREE.DoubleSide,
            emissive: new THREE.Color(0xe6a830),
            emissiveIntensity: 0.38,
          }),
        );
        envFlap.position.y = 0.75;
        envGrp.add(envFlap);
        envGrp.add(
          new THREE.Mesh(
            new THREE.PlaneGeometry(1.9, 1.2),
            new THREE.MeshStandardMaterial({
              color: 0xffffff,
              roughness: 0.85,
              side: THREE.DoubleSide,
              emissive: new THREE.Color(0xffffff),
              emissiveIntensity: 0.18,
            }),
          ).translateZ(0.05),
        );
        const hc = document.createElement("canvas");
        hc.width = 64;
        hc.height = 64;
        const hx = hc.getContext("2d");
        hx.fillStyle = "#ec4899";
        hx.beginPath();
        hx.moveTo(32, 22);
        hx.bezierCurveTo(32, 12, 14, 10, 14, 22);
        hx.bezierCurveTo(14, 32, 32, 40, 32, 46);
        hx.bezierCurveTo(32, 40, 50, 32, 50, 22);
        hx.bezierCurveTo(50, 10, 32, 12, 32, 22);
        hx.fill();
        const ht = new THREE.CanvasTexture(hc);
        const heart = new THREE.Mesh(
          new THREE.PlaneGeometry(0.42, 0.42),
          new THREE.MeshBasicMaterial({
            map: ht,
            transparent: true,
            depthWrite: false,
          }),
        );
        heart.position.set(0, -0.1, 0.04);
        envGrp.add(heart);
        envGrp.add(new THREE.PointLight(0xf0c674, 2.5, 7));
        const el2 = new THREE.PointLight(0xf9a8d4, 1, 5);
        el2.position.set(0, -0.4, 0.4);
        envGrp.add(el2);
        envGrp.position.set(6, 2, -4);
        envGrp.scale.setScalar(0.8);
        scene.add(envGrp);
      }

      /* === METEORS === */
      class Meteors {
        constructor(sc) {
          this.sc = sc;
          this.list = [];
          this.tmr = 0;
          this.intv = 3 + Math.random() * 5;
        }
        spawn(cnt = 1) {
          for (let i = 0; i < cnt; i++) {
            const len = 2 + Math.random() * 3,
              segs = 20;
            const pa = new Float32Array(segs * 3),
              aa = new Float32Array(segs);
            const st = new THREE.Vector3(
              (Math.random() - 0.5) * 40,
              10 + Math.random() * 15,
              (Math.random() - 0.5) * 40,
            );
            const dir = new THREE.Vector3(
              (Math.random() - 0.5) * 2,
              -1 - Math.random(),
              (Math.random() - 0.5) * 2,
            ).normalize();
            for (let j = 0; j < segs; j++) {
              const t = j / (segs - 1);
              pa[j * 3] = st.x + dir.x * len * t;
              pa[j * 3 + 1] = st.y + dir.y * len * t;
              pa[j * 3 + 2] = st.z + dir.z * len * t;
              aa[j] = 1 - t;
            }
            const g = new THREE.BufferGeometry();
            g.setAttribute("position", new THREE.BufferAttribute(pa, 3));
            g.setAttribute("aAlpha", new THREE.BufferAttribute(aa, 1));
            const m = new THREE.ShaderMaterial({
              uniforms: { uO: { value: 1 } },
              vertexShader:
                "attribute float aAlpha;uniform float uO;varying float vA;void main(){vA=aAlpha*uO;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}",
              fragmentShader:
                "varying float vA;void main(){gl_FragColor=vec4(1.,.92,.75,vA);}",
              transparent: true,
              blending: THREE.AdditiveBlending,
              depthWrite: false,
            });
            const line = new THREE.Line(g, m);
            this.sc.add(line);
            this.list.push({
              line,
              g,
              m,
              dir: dir.clone(),
              spd: 15 + Math.random() * 20,
              life: 0,
              ml: 1.5 + Math.random(),
            });
          }
        }
        update(dt) {
          this.tmr += dt;
          if (this.tmr > this.intv) {
            this.tmr = 0;
            this.intv = 3 + Math.random() * 5;
            this.spawn(1);
          }
          for (let i = this.list.length - 1; i >= 0; i--) {
            const m = this.list[i];
            m.life += dt;
            const t = m.life / m.ml;
            m.m.uniforms.uO.value = Math.max(0, 1 - t * t);
            const pa = m.g.attributes.position.array;
            const mv = m.spd * dt;
            for (let j = 0; j < pa.length; j += 3) {
              pa[j] += m.dir.x * mv;
              pa[j + 1] += m.dir.y * mv;
              pa[j + 2] += m.dir.z * mv;
            }
            m.g.attributes.position.needsUpdate = true;
            if (m.life >= m.ml) {
              this.sc.remove(m.line);
              m.g.dispose();
              m.m.dispose();
              this.list.splice(i, 1);
            }
          }
        }
      }

      /* === AUDIO MP3 LOKAL === */
      function mkAudio() {
        // Muat file MP3 lokal Anda
        const audio = new Audio('brenda-universe.mp3');
        audio.loop = true; // Audio akan terus berputar sampai selesai (looping)
        audio.volume = 0.6; // Atur volume (0.0 - 1.0)
        let isPlaying = false;

        function start() {
          if (!isPlaying) {
            audio.play().then(() => {
              isPlaying = true;
              document.getElementById("aw").classList.add("on");
            }).catch(e => console.log("Autoplay diblokir browser:", e));
          }
        }

        function toggle() {
          if (isPlaying) {
            audio.pause();
            document.getElementById("aw").classList.remove("on");
            isPlaying = false;
          } else {
            start();
          }
        }

        return { toggle, start };
      }

      function toggleFly() {
        flying = !flying;
        const btn = document.getElementById("bf");
        if (flying) {
          btn.classList.add("on");
          for (const c of allPhotos) c.userData.ft = null;
        } else btn.classList.remove("on");
      }
      function startIntro() {
        if (introAn) return;
        introAn = { t: 0, dur: 3.5, startDist: 35 };
        ctl.enabled = false;
        toast("Welcome to Brenda's universe", 3000);
      }
      function updIntro(dt) {
        if (!introAn) return;
        introAn.t += dt;
        const t = Math.min(introAn.t / introAn.dur, 1);
        const e = eio(t);
        const d = introAn.startDist + (tDist - introAn.startDist) * e;
        const pos = cam.position.clone().normalize().multiplyScalar(d);
        pos.y = 2.5 + (1 - e) * 8;
        cam.position.copy(pos);
        cam.lookAt(0, 0, 0);
        if (t >= 1) {
          introAn = null;
          ctl.enabled = true;
        }
      }
      function updEnv(t) {
        if (!envGrp) return;
        envGrp.lookAt(cam.position);
        envGlow.material.uniforms.uTime.value = t;
        envFlap.rotation.x = Math.sin(t * 1.2) * 0.08;
        const lbl = document.getElementById("elb");
        const v = new THREE.Vector3();
        envGrp.getWorldPosition(v);
        v.project(cam);
        if (v.z > 0 && v.z < 1) {
          lbl.style.left = (v.x * 0.5 + 0.5) * innerWidth + "px";
          lbl.style.top = (-v.y * 0.5 + 0.5) * innerHeight + "px";
          lbl.classList.remove("out");
        } else lbl.classList.add("out");
      }

      /* === EVENTS === */
      function setupEvents() {
        mkLoadStars();
        initGrain();
        document.getElementById("by").addEventListener("click", () => {
          document.getElementById("land").classList.add("out");
          setTimeout(() => {
            document.getElementById("land").style.display = "none";
            document.getElementById("inst").classList.remove("out");
          }, 1000);
        });
        let noC = 0;
        const noT = [
          "Really? \ud83d\ude22",
          "Are you sure? \ud83d\udc94",
          "Please... \ud83e\udd7a",
          "Try again? \ud83e\udd79",
        ];
        document.getElementById("bn").addEventListener("click", function () {
          noC++;
          if (noC >= 4) {
            this.classList.add("gu");
            this.textContent = "No way \ud83d\ude22 (disabled)";
          } else {
            this.textContent = noT[noC - 1];
            this.style.transform = `translate(${(Math.random() - 0.5) * 200}px,${(Math.random() - 0.5) * 200}px)`;
            if (!this.classList.contains("tp")) this.classList.add("tp");
          }
        });
        
        // Saat tombol "Masuk ke Dunia Brenda" diklik, audio mulai diputar
        document.getElementById("bgo").addEventListener("click", () => {
          document.getElementById("inst").classList.add("out");
          audSys.start(); // <-- Memulai audio MP3 otomatis
          setTimeout(() => {
            document.getElementById("inst").style.display = "none";
            document.getElementById("ui").classList.remove("out");
            started = true;
            startIntro();
          }, 700);
        });

        document
          .getElementById("aw")
          .addEventListener("click", () => audSys.toggle());
        document.getElementById("aw").addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") audSys.toggle();
        });
        document.getElementById("bf").addEventListener("click", () => {
          if (started) toggleFly();
        });
        document.getElementById("bl").addEventListener("click", () => {
          if (!started) return;
          document.getElementById("lov").classList.remove("out");
          pulseSys.fire();
          typewriter();
        });
        document.getElementById("lcl").addEventListener("click", () => {
          document.getElementById("lov").classList.add("out");
          twRunning = false;
        });
        document.getElementById("bm").addEventListener("click", () => {
          if (started) {
            metSys.spawn(8 + Math.floor(Math.random() * 8));
            toast("Meteor burst!");
          }
        });
        const cv = ren.domElement;
        cv.addEventListener("pointerdown", (e) => {
          ptrDn.x = e.clientX;
          ptrDn.y = e.clientY;
          isDrag = false;
        });
        cv.addEventListener("pointermove", (e) => {
          if (
            Math.abs(e.clientX - ptrDn.x) > 6 ||
            Math.abs(e.clientY - ptrDn.y) > 6
          )
            isDrag = true;
        });
        cv.addEventListener("pointerup", (e) => {
          if (isDrag) return;
          ms.x = (e.clientX / innerWidth) * 2 - 1;
          ms.y = -(e.clientY / innerHeight) * 2 + 1;
          ray.setFromCamera(ms, cam);
          const hits = ray.intersectObjects(allPhotos, true);
          if (hits.length) {
            let obj = hits[0].object;
            while (obj.parent && !obj.userData.exploding) obj = obj.parent;
            if (obj.userData.exploding !== undefined) {
              if (flying) {
                toggleFly();
                return;
              }
              obj.userData.exploding = true;
              obj.userData.expPos = obj.position.clone();
              obj.userData.expVel = hits[0].point
                .clone()
                .sub(obj.position)
                .normalize()
                .multiplyScalar(4 + Math.random() * 3);
              pulseSys.fire();
            }
            return;
          }
          const eH = ray.intersectObjects(envGrp.children, true);
          if (eH.length) {
            document.getElementById("lov").classList.remove("out");
            pulseSys.fire();
            typewriter();
          }
        });
        let lastClk = 0;
        cv.addEventListener("click", () => {
          const now = Date.now();
          if (now - lastClk < 350 && started) {
            startCin();
            audSys.start(); // Pastikan MP3 tetap berjalan saat double-click
          }
          lastClk = now;
        });
        cv.addEventListener(
          "wheel",
          (e) => {
            if (!started) return;
            e.preventDefault();
            tDist = Math.max(
              ZOOM_MIN,
              Math.min(ZOOM_MAX, tDist + e.deltaY * ZOOM_SPEED * 0.1),
            );
            cam.position.copy(
              cam.position.clone().normalize().multiplyScalar(tDist),
            );
          },
          { passive: false },
        );
        let lastPinch = 0;
        cv.addEventListener(
          "touchstart",
          (e) => {
            if (e.touches.length === 2) {
              const dx = e.touches[0].clientX - e.touches[1].clientX,
                dy = e.touches[0].clientY - e.touches[1].clientY;
              lastPinch = Math.sqrt(dx * dx + dy * dy);
            }
          },
          { passive: true },
        );
        cv.addEventListener(
          "touchmove",
          (e) => {
            if (e.touches.length === 2) {
              e.preventDefault();
              const dx = e.touches[0].clientX - e.touches[1].clientX,
                dy = e.touches[0].clientY - e.touches[1].clientY;
              const d = Math.sqrt(dx * dx + dy * dy);
              tDist = Math.max(
                ZOOM_MIN,
                Math.min(ZOOM_MAX, tDist + (lastPinch - d) * ZOOM_SPEED),
              );
              cam.position.copy(
                cam.position.clone().normalize().multiplyScalar(tDist),
              );
              lastPinch = d;
            }
          },
          { passive: false },
        );
        window.addEventListener("mousemove", (e) => {
          mX = (e.clientX / innerWidth - 0.5) * 2;
          mY = (e.clientY / innerHeight - 0.5) * 2;
        });
        window.addEventListener("keydown", (e) => {
          if (!started) return;
          if (e.key === "ArrowUp") toggleFly();
          if (e.key === " ") {
            e.preventDefault();
            startCin();
          }
        });
        window.addEventListener("resize", () => {
          cam.aspect = innerWidth / innerHeight;
          cam.updateProjectionMatrix();
          ren.setSize(innerWidth, innerHeight);
        });
      }

      function mkLandStars() {
        const c = document.getElementById("lsts");
        if (!c) return;
        for (let i = 0; i < 80; i++) {
          const s = document.createElement("div");
          s.className = "lst";
          const z = 0.5 + Math.random() * 2;
          s.style.cssText = `width:${z}px;height:${z}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;--d:${1.5 + Math.random() * 4}s;--dl:${Math.random() * 4}s`;
          c.appendChild(s);
        }
      }

      /* === ANIMATE === */
      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clk.getDelta(), 0.05);
        const t = clk.getElapsedTime();
        if (stars) stars.material.uniforms.uTime.value = t;
        if (cParts) cParts.material.uniforms.uTime.value = t;
        for (const m of ringPMats) m.uniforms.uTime.value = t;
        if (auroraData)
          for (const mesh of auroraData.meshes)
            mesh.material.uniforms.uTime.value = t;
        const hb = heartbeat(t);
        if (pkCore) {
          pkCore.rotation.y = t * 0.15;
          pkCore.rotation.x = Math.sin(t * 0.1) * 0.08;
          pkCore.scale.setScalar(hb);
        }
        if (pkGlow) {
          pkGlow.rotation.y = t * 0.15;
          pkGlow.rotation.x = Math.sin(t * 0.1) * 0.08;
          pkGlow.scale.setScalar(hb);
          pkGlow.material.uniforms.cf.value = 0.25 + Math.sin(t * 1.5) * 0.04;
        }
        if (pkGlowO) {
          pkGlowO.rotation.y = t * 0.15;
          pkGlowO.rotation.x = Math.sin(t * 0.1) * 0.08;
          pkGlowO.scale.setScalar(hb);
        }
        if (planetRings) planetRings.rotation.y = t * 0.06;
        for (const grp of ringGroups) grp.rotation.y += grp.userData.speed * dt;
        updateAllPhotos(t, dt);
        updEnv(t);
        metSys.update(dt);
        pulseSys.update(dt);
        updCin(t);
        updIntro(dt);
        if (ctl.enabled && !introAn && !cinC) {
          cam.position.x += Math.sin(t * 0.3) * 0.0003;
          cam.position.y += Math.sin(t * 0.4 + 1) * 0.0002;
          ctl.target.x += mX * 0.002 * dt;
          ctl.target.y += -mY * 0.0015 * dt;
          ctl.target.x *= 0.98;
          ctl.target.y *= 0.98;
        }
        ctl.update();
        const cd = cam.position.length();
        if (Math.abs(cd - tDist) > 0.5)
          cam.position.copy(
            cam.position.clone().normalize().multiplyScalar(tDist),
          );
        const t3d = document.getElementById("t3d");
        if (t3d) {
          const rx = (cam.position.y / tDist) * 8;
          const ry =
            Math.atan2(cam.position.x, cam.position.z) * (180 / Math.PI) * 0.15;
          t3d.style.transform = `rotateX(${-rx}deg) rotateY(${ry}deg)`;
        }
        ren.render(scene, cam);
      }

      init();
      setupEvents();
      animate();
    </script>
